services:
  # 1. Backend API Service
  - type: web
    name: micro-ibadah-api
    runtime: docker
    dockerContext: server
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # User must provide this (e.g. from MongoDB Atlas)
      - key: CLIENT_URL
        sync: false # Set to the URL of your frontend once deployed
      - key: JWT_SECRET
        generateValue: true

  # 2. Frontend Client Service
  - type: web
    name: micro-ibadah-client
    runtime: docker
    dockerContext: client
    dockerfilePath: Dockerfile
    envVars:
      - key: VITE_API_URL
        value: /api # This works with the Nginx proxy defined in client/nginx.conf
